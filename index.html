<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Master: Time-Trial Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root {
            --bg: #09090b; --surface: #18181b; --border: #27272a;
            --primary: #8b5cf6; --accent: #f43f5e; --gold: #ffb300;
            --text: #f4f4f5; --text-muted: #a1a1aa; --success: #22c55e;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 850px; }
        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.6); }
        h1 { color: var(--primary); font-weight: 800; text-align: center; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; }
        .btn { padding: 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 800; width: 100%; text-transform: uppercase; transition: 0.2s; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-danger { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: white; }
        
        .timer-box { text-align: center; margin: 20px 0; padding: 20px; background: #000; border-radius: 8px; border: 1px solid var(--gold); }
        .timer-val { font-size: 5rem; font-weight: 800; color: var(--gold); font-variant-numeric: tabular-nums; }
        .phase-label { font-size: 1.2rem; color: var(--primary); font-weight: 800; letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; }
        
        .task-card { font-size: 1.3rem; line-height: 1.6; min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 25px; background: #111; border-radius: 8px; border-left: 6px solid var(--primary); margin-bottom: 20px; }
        .highlight { color: var(--gold); font-weight: 800; }
        #game-screen { display: none; }
        .status-bar { display: flex; justify-content: space-between; font-weight: 800; color: var(--text-muted); margin-bottom: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="setup-screen" class="panel">
        <h1>Power Exchange: Time Trials</h1>
        <div class="grid-2">
            <div class="form-group">
                <label>Player A</label>
                <input type="text" id="pa-name" placeholder="Name">
                <select id="pa-gender"><option value="male">Male</option><option value="female">Female</option><option value="nb">Non-Binary</option></select>
            </div>
            <div class="form-group">
                <label>Player B</label>
                <input type="text" id="pb-name" placeholder="Name">
                <select id="pb-gender"><option value="male">Male</option><option value="female">Female</option><option value="nb">Non-Binary</option></select>
            </div>
        </div>
        <div class="form-group">
            <label>Rounds</label>
            <input type="number" id="rounds" value="10">
        </div>
        <button class="btn btn-primary" onclick="Engine.start()">Randomize Roles & Begin</button>
    </div>

    <div id="game-screen">
        <div class="panel">
            <div class="status-bar">
                <span id="ui-round">Round 1</span>
                <span id="ui-roles" style="color: var(--primary);">Master: ? | Sub: ?</span>
            </div>

            <div class="timer-box">
                <div class="phase-label" id="phase-name">Awaiting Master</div>
                <div class="timer-val" id="timer-display">00:00</div>
            </div>

            <div class="task-card" id="task-text">Generate a task to begin the trial.</div>

            <div id="controls">
                <button class="btn btn-primary" id="master-btn" onclick="Engine.nextPhase()">Master: Start Phase</button>
                <div class="grid-2" id="resolution-btns" style="display:none;">
                    <button class="btn btn-success" onclick="Engine.resolve(true)">Sub Success (Swap)</button>
                    <button class="btn btn-danger" onclick="Engine.resolve(false)">Sub Fail (Retain)</button>
                </div>
                <button class="btn btn-gold" id="gen-btn" style="display:none;" onclick="Engine.drawTask()">Next Round</button>
            </div>
        </div>
    </div>
</div>

<script>
    const taskDatabase = [
        // DUAL TIMER TASKS (Application Phase & Challenge Phase)
        { type: 'dual', text: "{dom}, you have [T1] to tie {sub}'s wrists behind their back using **[Restraints]**. Once done, {sub} has [T2] to escape.", t1: 180, t2: 120 },
        { type: 'dual', text: "{dom}, apply **[Gags]** and **[Blindfolds]** within [T1]. {sub} then has [T1] to navigate the room and find the Master by sound alone.", t1: 120, t2: 180 },
        { type: 'dual', text: "{dom}, tie {sub} in a 'Mermaid Tail' using **[Restraints]** in [T1]. {sub} must then hop across the room in [T2].", t1: 240, t2: 60 },
        { type: 'dual', text: "{dom}, tie {sub} into a tight 'Hogtie' in [T1]. {sub} must then endure **[Impact]** for [T2] without crying out.", t1: 300, t2: 120 },
        
        // SINGLE TIMER TASKS (Immediate Challenge)
        { type: 'single', text: "{sub} must endure continuous use of **[Toys]** on a sensitive area for [T1] without clenching or moving.", t1: 180 },
        { type: 'single', text: "{sub} must count every strike of **[Impact]** delivered by {dom} for [T1]. Any missed count restarts the timer.", t1: 240 },
        { type: 'single', text: "{sub} must keep a mouthful of water without swallowing while {dom} uses **[Sensation]** (ice/wax) for [T1].", t1: 150 }
    ];

    const Engine = {
        state: { round: 1, maxRounds: 10, phase: 0, timerId: null, currentTask: null },
        p1: null, p2: null, dom: null, sub: null,

        start() {
            this.p1 = { name: document.getElementById('pa-name').value || "P1", gender: document.getElementById('pa-gender').value };
            this.p2 = { name: document.getElementById('pb-name').value || "P2", gender: document.getElementById('pb-gender').value };
            this.state.maxRounds = document.getElementById('rounds').value;
            
            if(Math.random() > 0.5) { this.dom = this.p1; this.sub = this.p2; } 
            else { this.dom = this.p2; this.sub = this.p1; }

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            this.updateUI();
            this.drawTask();
        },

        updateUI() {
            const dTitle = this.getTitle(this.dom.gender, 'dom');
            const sTitle = this.getTitle(this.dom.gender, 'sub');
            document.getElementById('ui-roles').innerText = `Master: ${this.dom.name} | Sub: ${this.sub.name}`;
            document.getElementById('ui-round').innerText = `Round ${this.state.round} / ${this.state.maxRounds}`;
        },

        getTitle(g, r) {
            if(r === 'dom') return g === 'male' ? 'Master' : g === 'female' ? 'Mistress' : 'Dom';
            return g === 'male' ? 'boy' : g === 'female' ? 'girl' : 'pet';
        },

        drawTask() {
            this.state.phase = 0;
            this.state.currentTask = taskDatabase[Math.floor(Math.random() * taskDatabase.length)];
            let html = this.state.currentTask.text
                .replace(/{dom}/g, `<span class='highlight'>${this.dom.name}</span>`)
                .replace(/{sub}/g, `<span class='highlight'>${this.sub.name}</span>`)
                .replace(/\[T1\]/g, this.formatSec(this.state.currentTask.t1))
                .replace(/\[T2\]/g, this.formatSec(this.state.currentTask.t2 || 0));

            document.getElementById('task-text').innerHTML = html;
            document.getElementById('phase-name').innerText = "Trial Assigned";
            document.getElementById('timer-display').innerText = this.formatSec(this.state.currentTask.t1);
            
            document.getElementById('master-btn').style.display = 'block';
            document.getElementById('master-btn').innerText = `${this.dom.name}: Start Phase 1`;
            document.getElementById('gen-btn').style.display = 'none';
            document.getElementById('resolution-btns').style.display = 'none';
        },

        nextPhase() {
            clearInterval(this.state.timerId);
            this.state.phase++;
            
            if (this.state.phase === 1) {
                document.getElementById('phase-name').innerText = "Phase 1: Application";
                this.runTimer(this.state.currentTask.t1);
                
                if (this.state.currentTask.type === 'dual') {
                    document.getElementById('master-btn').innerText = `${this.dom.name}: Ready for Phase 2`;
                } else {
                    document.getElementById('master-btn').style.display = 'none';
                    document.getElementById('resolution-btns').style.display = 'grid';
                }
            } 
            else if (this.state.phase === 2 && this.state.currentTask.type === 'dual') {
                document.getElementById('phase-name').innerText = "Phase 2: The Challenge";
                this.runTimer(this.state.currentTask.t2);
                document.getElementById('master-btn').style.display = 'none';
                document.getElementById('resolution-btns').style.display = 'grid';
            }
        },

        runTimer(sec) {
            let t = sec;
            this.state.timerId = setInterval(() => {
                t--;
                document.getElementById('timer-display').innerText = this.formatSec(t);
                if (t <= 0) {
                    clearInterval(this.state.timerId);
                    document.getElementById('timer-display').innerText = "TIME UP";
                }
            }, 1000);
        },

        resolve(success) {
            clearInterval(this.state.timerId);
            if (success) {
                let temp = this.dom;
                this.dom = this.sub;
                this.sub = temp;
                alert(`${this.dom.name} has usurped the power!`);
            } else {
                alert(`${this.dom.name} maintains control.`);
            }
            this.state.round++;
            this.updateUI();
            
            document.getElementById('resolution-btns').style.display = 'none';
            document.getElementById('gen-btn').style.display = 'block';
            document.getElementById('phase-name').innerText = "Round Over";
        },

        formatSec(s) {
            let m = Math.floor(s / 60);
            let sec = s % 60;
            return `${m}:${sec.toString().padStart(2, '0')}`;
        }
    };

    Engine.init = Engine.updateUI;
</script>
</body>
</html>
