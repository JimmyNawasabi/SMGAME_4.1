]<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Master: Clean Format Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root {
            --bg: #09090b; --surface: #18181b; --border: #27272a;
            --primary: #8b5cf6; --accent: #f43f5e; --gold: #fbbf24;
            --text: #f4f4f5; --text-muted: #a1a1aa;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 1000px; }
        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        h1, h2, h3 { color: var(--primary); font-weight: 800; text-transform: uppercase; margin: 0 0 15px 0; letter-spacing: 1px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 700; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; font-family: inherit; }
        
        /* Buttons */
        .btn { padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: 800; width: 100%; text-transform: uppercase; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-danger { background: var(--accent); color: white; }
        .btn-warning { background: #ca8a04; color: white; }

        /* Inventory */
        .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .db-box { background: #111; padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .chip { display: inline-flex; align-items: center; background: var(--border); padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; margin: 3px; border: 2px solid transparent; cursor: pointer; }
        .chip.active { border-color: var(--primary); background: #2e1a4d; }

        /* FIXED TASK CARD FORMATTING */
        .task-card { 
            font-size: 1.25rem; 
            line-height: 1.6; 
            min-height: 160px; 
            max-height: 300px;
            overflow-y: auto;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            text-align: center; 
            padding: 30px; 
            background: #0a0a0a; 
            border-radius: 8px; 
            border-left: 8px solid var(--primary); 
            margin-bottom: 20px; 
            box-sizing: border-box;
            white-space: normal;
            word-break: break-word;
        }
        .item-highlight { color: var(--gold); font-weight: 800; border-bottom: 1px dashed var(--gold); }

        /* Game Elements */
        #game-screen { display: none; }
        .timer-box { text-align: center; margin: 20px 0; padding: 20px; background: #000; border-radius: 8px; border: 3px solid var(--gold); }
        .timer-val { font-size: 5rem; font-weight: 800; color: var(--gold); font-variant-numeric: tabular-nums; line-height: 1; }
        .score-display { display: flex; justify-content: space-around; background: #000; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); }
        .score-num { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>

<div class="app-container">
    <div id="setup-screen" class="panel">
        <h1>Engine Configuration</h1>
        <div class="grid-3" style="margin-bottom: 20px;">
            <div class="form-group"><label>Player A</label><input type="text" id="pa-name" placeholder="Name"></div>
            <div class="form-group"><label>Player B</label><input type="text" id="pb-name" placeholder="Name"></div>
            <div class="form-group"><label>Vetos</label><input type="number" id="setup-vetos" value="3"></div>
        </div>

        <h3>1. Inventory Database</h3>
        <div class="inv-grid" id="inventory-ui"></div>

        <div class="grid-3">
            <div>
                <h3>2. Task Creator</h3>
                <div class="db-box">
                    <textarea id="new-task-text" placeholder="Tokens: {dom}, {sub}, [Restraint], [Impact], [Sensory], [Toy], [Gag], [Blindfold]" rows="4"></textarea>
                    <input type="number" id="new-task-time" placeholder="Duration (Seconds)" style="margin-top:10px;">
                    <button class="btn btn-outline" style="margin-top:10px;" onclick="Engine.saveCustomTask()">Save Task</button>
                </div>
            </div>
            <div>
                <h3>3. Grand Prizes</h3>
                <div class="db-box">
                    <input type="text" id="new-prize" placeholder="Reward Description...">
                    <button class="btn btn-outline" style="margin-top:10px;" onclick="Engine.savePrize()">Add Prize</button>
                    <div id="prize-list" style="margin-top:10px;"></div>
                </div>
            </div>
        </div>
        <button class="btn btn-primary" style="padding: 20px; font-size: 1.2rem; margin-top: 20px;" onclick="Engine.start()">Enter The Chamber</button>
    </div>

    <div id="game-screen">
        <div class="panel">
            <div class="score-display">
                <div style="text-align:center"><label id="label-pa">Player A</label><div class="score-num" id="score-pa">0</div></div>
                <div style="text-align:center"><label>Round</label><div class="score-num" id="ui-round">1</div></div>
                <div style="text-align:center"><label id="label-pb">Player B</label><div class="score-num" id="score-pb">0</div></div>
            </div>
            <div style="text-align: center; font-weight: 800; color: var(--gold); margin-bottom: 10px; text-transform: uppercase;">
                Dom: <span id="current-dom-name">?</span> | Vetos: <span id="ui-vetos">3</span>
            </div>
            <div class="timer-box">
                <div id="phase-name" style="color:var(--primary); font-weight: 800; text-transform: uppercase; margin-bottom:5px;">Awaiting Master</div>
                <div class="timer-val" id="timer-display">00:00</div>
            </div>

            <div class="task-card" id="task-text">Initializing text layout...</div>

            <div id="game-controls">
                <button class="btn btn-primary" id="timer-btn" onclick="Engine.triggerPhase()">Start Task</button>
                <div class="grid-3" id="resolution-btns" style="display:none; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn btn-success" onclick="Engine.resolve(true)">Success (+1 & Swap)</button>
                    <button class="btn btn-danger" onclick="Engine.resolve(false)">Failure (-1 & Stay)</button>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px;">
                    <button class="btn btn-outline" onclick="Engine.veto()">Veto</button>
                    <button class="btn btn-warning" id="pause-btn" onclick="Engine.togglePause()">Yellow Card</button>
                    <button class="btn btn-danger" onclick="Engine.safeWord()">SAFE WORD (-5)</button>
                </div>
                <button class="btn btn-danger" style="margin-top: 15px; background: #7f1d1d;" onclick="Engine.redCard()">RED CARD (STOP)</button>
                <button class="btn btn-gold" id="next-btn" style="display:none;" onclick="Engine.drawTask()">Next Round</button>
            </div>
        </div>
    </div>
</div>

<script>
    const Engine = {
        inventory: JSON.parse(localStorage.getItem('tm_v7_inv')) || { 
            Restraint: [], Impact: [], Sensory: [], Toy: [], Gag: [], Blindfold: [], Furniture: [], Clothing: [] 
        },
        customTasks: JSON.parse(localStorage.getItem('tm_v7_tasks')) || [],
        prizes: JSON.parse(localStorage.getItem('tm_v7_prizes')) || [],
        state: { pa: {n:'', s:0}, pb: {n:'', s:0}, dom: null, sub: null, round: 1, timer: null, currentTask: null, vetos: 3, isPaused: false, timeLeft: 0 },

        init() {
            const ui = document.getElementById('inventory-ui');
            Object.keys(this.inventory).forEach(cat => {
                const div = document.createElement('div');
                div.className = 'db-box';
                div.innerHTML = `<label>${cat}</label>
                    <input type="text" placeholder="Add..." onkeydown="if(event.key==='Enter') Engine.addItem('${cat}', this)">
                    <div id="list-${cat}" style="min-height:20px; margin-top:5px;"></div>`;
                ui.appendChild(div);
                this.renderItems(cat);
            });
            this.renderPrizes();
        },

        addItem(cat, input) {
            if(!input.value) return;
            this.inventory[cat].push({ name: input.value, active: true });
            input.value = ''; this.save(); this.renderItems(cat);
        },
        toggleItem(cat, idx) { this.inventory[cat][idx].active = !this.inventory[cat][idx].active; this.save(); this.renderItems(cat); },
        removeItem(cat, idx) { this.inventory[cat].splice(idx, 1); this.save(); this.renderItems(cat); },
        renderItems(cat) {
            document.getElementById(`list-${cat}`).innerHTML = this.inventory[cat].map((item, i) => 
                `<div class="chip ${item.active ? 'active' : ''}" onclick="Engine.toggleItem('${cat}', ${i})">
                    ${item.name} <span onclick="event.stopPropagation(); Engine.removeItem('${cat}', ${i})">×</span>
                </div>`).join('');
        },

        saveCustomTask() {
            const t = document.getElementById('new-task-text').value;
            const time = parseInt(document.getElementById('new-task-time').value) || 120;
            if(t) { this.customTasks.push({ text: t, time: time }); this.save(); alert("Task Saved"); document.getElementById('new-task-text').value = ''; }
        },
        savePrize() {
            const p = document.getElementById('new-prize').value;
            if(p) { this.prizes.push(p); this.save(); this.renderPrizes(); document.getElementById('new-prize').value = ''; }
        },
        renderPrizes() {
            document.getElementById('prize-list').innerHTML = this.prizes.map((p, i) => 
                `<div class="chip">${p} <span onclick="Engine.removePrize(${i})">×</span></div>`).join('');
        },
        removePrize(i) { this.prizes.splice(i, 1); this.save(); this.renderPrizes(); },
        save() {
            localStorage.setItem('tm_v7_inv', JSON.stringify(this.inventory));
            localStorage.setItem('tm_v7_tasks', JSON.stringify(this.customTasks));
            localStorage.setItem('tm_v7_prizes', JSON.stringify(this.prizes));
        },

        start() {
            this.state.pa.n = document.getElementById('pa-name').value || "Player A";
            this.state.pb.n = document.getElementById('pb-name').value || "Player B";
            this.state.vetos = parseInt(document.getElementById('setup-vetos').value) || 3;
            document.getElementById('label-pa').innerText = this.state.pa.n;
            document.getElementById('label-pb').innerText = this.state.pb.n;
            document.getElementById('ui-vetos').innerText = this.state.vetos;
            if(Math.random() > 0.5) { this.state.dom = this.state.pa; this.state.sub = this.state.pb; } 
            else { this.state.dom = this.state.pb; this.state.sub = this.state.pa; }
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            this.drawTask();
        },

        drawTask() {
            this.state.isPaused = false; clearInterval(this.state.timer);
            const pool = this.customTasks.length > 0 ? this.customTasks : [{text: "[dom] Blindfolds with [Blindfold] and applies [Gag] to gag [sub] then ties wrists behind their back and their ankles togther pulling them into strict hogtie using [Restraint]. [Sub] must remain still for [Time] while [Dom] uses [Sensory] without making a sound or moving.", time: 180}]; this.state.currentTask = pool[Math.floor(Math.random() * pool.length)];
            
            let finalHtml = this.state.currentTask.text
                .replace(/{dom}/g, `<span style="color:var(--primary); font-weight:800">${this.state.dom.n}</span>`)
                .replace(/{sub}/g, `<span style="color:var(--primary); font-weight:800">${this.state.sub.n}</span>`)
                .replace(/\[Time\]/g, this.fmt(this.state.currentTask.time));

            Object.keys(this.inventory).forEach(cat => {
                const activeItems = this.inventory[cat].filter(item => item.active);
                const placeholder = `[${cat}]`;
                if (finalHtml.includes(placeholder)) {
                    const chosenItem = activeItems.length > 0 ? activeItems[Math.floor(Math.random() * activeItems.length)].name : `(No ${cat})`;
                    finalHtml = finalHtml.split(placeholder).join(`<span class="item-highlight">${chosenItem}</span>`);
                }
            });

            document.getElementById('task-text').innerHTML = `<div>${finalHtml}</div>`;
            document.getElementById('current-dom-name').innerText = this.state.dom.n;
            document.getElementById('timer-display').innerText = this.fmt(this.state.currentTask.time);
            document.getElementById('timer-btn').style.display = 'block';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('resolution-btns').style.display = 'none';
            document.getElementById('phase-name').innerText = "Trial Assigned";
        },

        triggerPhase() {
            this.runTimer(this.state.currentTask.time);
            document.getElementById('phase-name').innerText = "Trial Active";
            document.getElementById('timer-btn').style.display = 'none';
            document.getElementById('resolution-btns').style.display = 'grid';
        },

        runTimer(sec) {
            clearInterval(this.state.timer); this.state.timeLeft = sec;
            this.state.timer = setInterval(() => {
                if(!this.state.isPaused) {
                    this.state.timeLeft--;
                    document.getElementById('timer-display').innerText = this.fmt(this.state.timeLeft);
                    if(this.state.timeLeft <= 0) { clearInterval(this.state.timer); document.getElementById('timer-display').innerText = "00:00"; }
                }
            }, 1000);
        },

        resolve(success) {
            if(success) {
                this.state.sub.s += 1;
                let temp = this.state.dom; this.state.dom = this.state.sub; this.state.sub = temp;
                alert(`SUCCESS! +1 point and Role Swap.`);
            } else { this.state.sub.s -= 1; alert(`FAILURE! -1 point.`); }
            this.updateScores(); this.state.round++;
            document.getElementById('ui-round').innerText = this.state.round;
            document.getElementById('resolution-btns').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
        },

        togglePause() { this.state.isPaused = !this.state.isPaused; document.getElementById('pause-btn').innerText = this.state.isPaused ? "RESUME" : "Yellow Card"; },
        veto() { if(this.state.vetos > 0) { this.state.vetos--; document.getElementById('ui-vetos').innerText = this.state.vetos; this.drawTask(); } },
        safeWord() { this.state.sub.s -= 5; this.updateScores(); this.state.isPaused = true; alert("SAFE WORD: Subversive -5 pts. Paused."); },
        redCard() { clearInterval(this.state.timer); document.body.innerHTML = "<div style='color:white; text-align:center; padding:50px;'><h1>EMERGENCY STOP</h1><button onclick='location.reload()'>Reset Engine</button></div>"; },
        updateScores() { document.getElementById('score-pa').innerText = this.state.pa.s; document.getElementById('score-pb').innerText = this.state.pb.s; },
        fmt: (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`
    };
    Engine.init();
</script>
</body>
</html>
